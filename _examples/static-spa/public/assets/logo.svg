<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" opacity="0.8"/>

  <!-- Geometric pattern -->
  <polygon points="100,30 130,70 100,110 70,70" fill="white" opacity="0.9"/>
  <polygon points="100,90 130,130 100,170 70,130" fill="white" opacity="0.7"/>

  <!-- Center accent -->
  <circle cx="100" cy="100" r="15" fill="white" opacity="0.95"/>
</svg>
