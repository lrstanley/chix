name: generate-code

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 10 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: install-go
        uses: actions/setup-go@v5
        with:
          go-version: latest
      - uses: actions/checkout@v4
      - run: make generate
      - uses: EndBug/add-and-commit@5442017c908921e9bee9dfca7978ca6901143bf0
        with:
          message: "chore(gen): codegen changes"
          commit: "--signoff"
          pathspec_error_handling: "ignore"
          add: "*.go"
